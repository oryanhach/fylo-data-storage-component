<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Fylo data storage component</title>

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <main class="fylo">

    <section class="fylo__card fylo__card--top">
      <div class="fylo__top-content">
        <img class="fylo__logo" src="images/logo.svg" alt="Fylo logo">
        <div class="fylo__actions">
          <div class="fylo__icon-box">
            <img src="images/icon-document.svg" alt="">
          </div>
          <div class="fylo__icon-box">
            <img src="images/icon-folder.svg" alt="">
          </div>
          <div class="fylo__icon-box">
            <img src="images/icon-upload.svg" alt="">
          </div>
        </div>
      </div>
    </section>

    <section class="fylo__card fylo__card--bottom">
      <p class="fylo__description">You've used <span>815 GB</span> of your storage</p>
      <div class="fylo__progress">
        <div class="fylo__progress-fill"></div>
      </div>
      <div class="fylo__storage-scale">
        <p class="fylo__storage-label">0 GB</p>
        <p class="fylo__storage-label">1000 GB</p>
      </div>

      <div class="fylo__remaining">
        <p class="fylo__remaining-number">185</p>
        <p class="fylo__remaining-text">GB LEFT</p>
      </div>

    </section>

  </main>

</body>

</html>
